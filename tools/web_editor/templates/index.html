<!DOCTYPE html>
<html>
<head>
    <title>MusaX Web Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <style>
        body { background: #000; color: #ccc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #0000AA; padding: 5px 15px; border-bottom: 2px solid #FFAA00; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .title { color: #FFAA00; font-family: 'Courier New', monospace; font-weight: bold; font-size: 18px; letter-spacing: 2px; }
        .main-container { flex: 1; display: flex; flex-direction: column; gap: 4px; padding: 4px; background: #222; overflow: hidden; }
        .editor-container { flex: 1; display: flex; flex-direction: column; border: 1px solid #444; background: #000; transition: flex 0.2s; }
        .editor-container:focus-within { border-color: #FFAA00; flex: 2; }
        .editor-label { padding: 2px 10px; font-weight: bold; font-size: 11px; font-family: monospace; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; }
        .label-global { background: #333; color: #aaa; }
        .label-cha { background: #600; color: #f88; }
        .label-chb { background: #060; color: #8f8; }
        .label-chc { background: #006; color: #88f; }
        .ace_editor { flex: 1; width: 100%; font-size: 14px !important; }
        .controls { padding: 8px 15px; background: #0000AA; border-top: 1px solid #444; display: flex; gap: 20px; align-items: center; }
        button { background: #FFAA00; border: 1px solid #885500; color: #000; padding: 4px 15px; font-weight: bold; cursor: pointer; font-family: monospace; }
        button:hover { background: #FFCC00; }
        input { background: #000033; color: #FFAA00; border: 1px solid #444; padding: 3px 10px; width: 350px; font-family: monospace; }
        #status { color: #FFAA00; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">MUSAX WEB EDITOR v1.0</div>
        <div>
            <input type="text" id="filename" placeholder="ruta/al/archivo.msl" value="MusaX/examples/msl/korobeiniki.msl">
            <button onclick="loadFile()">LOAD</button>
        </div>
    </div>

    <div class="main-container">
        <div class="editor-container" style="flex: 1.5;">
            <div class="editor-label label-global">GLOBAL / INSTRUMENTS / PHRASES</div>
            <div id="editor-global"></div>
        </div>
        <div class="editor-container">
            <div class="editor-label label-cha">CHANNEL A</div>
            <div id="editor-cha"></div>
        </div>
        <div class="editor-container">
            <div class="editor-label label-chb">CHANNEL B</div>
            <div id="editor-chb"></div>
        </div>
        <div class="editor-container">
            <div class="editor-label label-chc">CHANNEL C</div>
            <div id="editor-chc"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="playMusic()" style="background: #00AA00; color: white;">PLAY (Ctrl+P)</button>
        <button onclick="saveFile()">SAVE (Ctrl+S)</button>
        <div id="status">Ready</div>
    </div>

    <script>
        // Custom Ace Mode for MusaX-ML (MSL)
        define('ace/mode/msl_highlight_rules', function(require, exports, module) {
            var oop = require("ace/lib/oop");
            var TextHighlightRules = require("ace/mode/text_highlight_rules").TextHighlightRules;

            var MSLHighlightRules = function() {
                this.$rules = {
                    "start": [
                        { token: "comment", regex: "//.*$" },
                        { token: "comment", regex: "/\\*", next: "comment" },
                        { token: "string", regex: "\"[^\"]*\"" },
                        { token: "constant.language", regex: "\\b(ADSR|LFO|FLAGS|PHRASE|INST)\\b" },
                        { token: "keyword.control", regex: "@[A-Z0-9]+(\\([^)]*\\))?" },
                        { token: "variable.parameter", regex: "\\b[A-G][+#b-]?[0-9]*\\.?" },
                        { token: "variable.parameter", regex: "\\b[ORL][0-9]+\\b" },
                        { token: "variable.parameter", regex: "[<>]" },
                        { token: "constant.numeric", regex: "\\b[0-9]+\\b" },
                        { token: "entity.name.function", regex: "^[\\w.]+:" },
                        { token: "keyword.operator", regex: "[{}:,]" }
                    ],
                    "comment": [
                        { token: "comment", regex: ".*?\\*/", next: "start" },
                        { token: "comment", regex: ".+" }
                    ]
                };
            };
            oop.inherits(MSLHighlightRules, TextHighlightRules);
            exports.MSLHighlightRules = MSLHighlightRules;
        });

        define('ace/mode/msl', function(require, exports, module) {
            var oop = require("ace/lib/oop");
            var TextMode = require("ace/mode/text").Mode;
            var MSLHighlightRules = require("ace/mode/msl_highlight_rules").MSLHighlightRules;

            var Mode = function() {
                this.HighlightRules = MSLHighlightRules;
            };
            oop.inherits(Mode, TextMode);
            exports.Mode = Mode;
        });

        // Inicializar editores Ace
        const editors = {
            global: ace.edit("editor-global"),
            cha: ace.edit("editor-cha"),
            chb: ace.edit("editor-chb"),
            chc: ace.edit("editor-chc")
        };

        Object.values(editors).forEach(ed => {
            ed.setTheme("ace/theme/dracula");
            ed.session.setMode("ace/mode/msl");
            ed.setShowPrintMargin(false);
            ed.renderer.setShowGutter(true);
            
            // Trigger resize when focused to handle flex expansion
            ed.on("focus", () => {
                setTimeout(() => {
                    Object.values(editors).forEach(e => e.resize());
                }, 210);
            });
        });

        async function saveFile() {
            const filename = document.getElementById('filename').value;
            const status = document.getElementById('status');
            status.innerText = "Saving...";

            const payload = {
                filename: filename,
                global: editors.global.getValue(),
                cha: editors.cha.getValue(),
                chb: editors.chb.getValue(),
                chc: editors.chc.getValue()
            };

            const response = await fetch('/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            status.innerText = data.message;
        }

        async function loadFile() {
            const filename = document.getElementById('filename').value;
            const status = document.getElementById('status');
            status.innerText = "Loading...";

            const response = await fetch('/load', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filename: filename})
            });
            const data = await response.json();
            
            if (data.status === 'success') {
                editors.global.setValue(data.global, -1);
                editors.cha.setValue(data.cha, -1);
                editors.chb.setValue(data.chb, -1);
                editors.chc.setValue(data.chc, -1);
                status.innerText = "Loaded " + filename;
            } else {
                status.innerText = "Error: " + data.message;
            }
        }

        async function playMusic() {
            const status = document.getElementById('status');
            status.innerText = "Compiling & Playing...";

            const payload = {
                global: editors.global.getValue(),
                cha: editors.cha.getValue(),
                chb: editors.chb.getValue(),
                chc: editors.chc.getValue()
            };

            const response = await fetch('/play', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            status.innerText = data.message;
        }

        // Atajos de teclado
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'p') {
                e.preventDefault();
                playMusic();
            }
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveFile();
            }
        });
    </script>
</body>
</html>
